<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>类案分析助手</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='legal_case_advisor.css', v=static_version) }}">
  </head>
  <body>
    <div class="app-shell">
      <header class="app-hero">
        <div class="hero-copy">
          <p class="eyebrow">Case-Based Legal Analysis</p>
          <h1>类案分析助手</h1>
          <p class="hero-text">
            先召回相关裁判文书，再由大模型整理出观点式回答。每个观点都附带支撑案例，支持悬停预览和全文溯源。
          </p>
        </div>
        <div class="hero-status">
          <div class="status-card">
            <span>召回链路</span>
            <strong id="health-retrieval">检查中</strong>
          </div>
          <div class="status-card">
            <span>Mimo 回答</span>
            <strong id="health-mimo">检查中</strong>
          </div>
          <div class="status-card">
            <span>当前模型</span>
            <strong>{{ model_name }}</strong>
          </div>
        </div>
      </header>

      <main class="workspace">
        <section class="control-pane">
          <form id="advisor-form" class="query-form">
            <label class="field field-xl">
              <span class="label-text">问题输入</span>
              <textarea
                id="query"
                name="query"
                rows="7"
                placeholder="例如：承租人拖欠租金时，出租人能否直接将押金用于抵扣欠付租金？合同未明确约定时法院通常怎么处理？"
              ></textarea>
            </label>

            <div class="example-row">
              <button type="button" class="example-button" data-query="承租人拖欠租金时，出租人能否直接将押金用于抵扣欠付租金？合同未明确约定时法院通常怎么处理？">押金抵扣租金</button>
              <button type="button" class="example-button" data-query="委托事项未完成时，委托人能否请求返还委托款并主张资金占用利息？">委托款返还</button>
              <button type="button" class="example-button" data-query="房屋买卖合同解除后，定金和违约金是否可以同时主张？">定金与违约金</button>
            </div>

            <div class="form-grid">
              <label class="field">
                <span class="label-text">召回模式</span>
                <select id="mode" name="mode">
                  <option value="bm25">BM25</option>
                  <option value="vector">Vector</option>
                  <option value="hybrid">Hybrid</option>
                </select>
              </label>

              <label class="field field-toggle">
                <span class="label-text">精排开关</span>
                <span class="toggle-wrap">
                  <input id="rerank" name="rerank" type="checkbox" checked>
                  <span class="toggle-track"></span>
                  <span class="toggle-label">开启 Rerank</span>
                </span>
              </label>

              <label class="field field-toggle">
                <span class="label-text">Query Profile</span>
                <span class="toggle-wrap">
                  <input id="query_profile" name="query_profile" type="checkbox" checked>
                  <span class="toggle-track"></span>
                  <span class="toggle-label">开启要素解析</span>
                </span>
              </label>

              <label class="field field-toggle">
                <span class="label-text">要素加权</span>
                <span class="toggle-wrap">
                  <input id="query_profile_boost" name="query_profile_boost" type="checkbox" checked>
                  <span class="toggle-track"></span>
                  <span class="toggle-label">强化否定事实</span>
                </span>
              </label>

              <label class="field">
                <span class="label-text">案件数</span>
                <input id="top_k" name="top_k" type="number" min="3" max="20" value="{{ defaults.top_k }}">
              </label>

              <label class="field">
                <span class="label-text">每案证据块</span>
                <input id="chunk_top_k" name="chunk_top_k" type="number" min="1" max="5" value="{{ defaults.chunk_top_k }}">
              </label>

              <label class="field">
                <span class="label-text">召回候选</span>
                <input id="candidate_size" name="candidate_size" type="number" min="20" max="200" value="{{ defaults.candidate_size }}">
              </label>

              <label class="field">
                <span class="label-text">Rerank TopN</span>
                <input id="rerank_top_n" name="rerank_top_n" type="number" min="5" max="100" value="{{ defaults.rerank_top_n }}">
              </label>
            </div>

            <details class="advanced-block">
              <summary>筛选条件</summary>
              <div class="advanced-grid">
                <label class="field">
                  <span class="label-text">案由</span>
                  <input id="reason" name="reason" type="text" placeholder="例如：房屋租赁合同纠纷">
                </label>
                <label class="field">
                  <span class="label-text">审级</span>
                  <input id="trial_level" name="trial_level" type="text" placeholder="例如：一审">
                </label>
                <label class="field">
                  <span class="label-text">法院</span>
                  <input id="court_name" name="court_name" type="text" placeholder="例如：上海市浦东新区人民法院">
                </label>
                <label class="field">
                  <span class="label-text">裁判日期起</span>
                  <input id="judge_date_from" name="judge_date_from" type="date">
                </label>
                <label class="field">
                  <span class="label-text">裁判日期止</span>
                  <input id="judge_date_to" name="judge_date_to" type="date">
                </label>
              </div>
            </details>

            <div class="action-row">
              <button type="submit" id="analyze-button" class="primary-button">生成类案分析</button>
              <p class="helper-text">回答将由 Mimo 生成，并为每个观点附带可回溯案例。</p>
            </div>
          </form>
        </section>

        <section class="analysis-pane">
          <div class="pane-header">
            <div>
              <p class="eyebrow">Applied Output</p>
              <h2>分析结果</h2>
            </div>
            <div class="run-meta" id="run-meta">等待提问</div>
          </div>

          <div class="status-banner idle" id="status-banner">
            输入一个问题后，系统会先做类案召回，再生成带案例支撑的观点式回答。
          </div>

          <div id="analysis-output" class="analysis-output">
            <div class="placeholder-card">
              <h3>结果将在这里展开</h3>
              <p>这版页面面向实际应用，重点展示可读结论、案例支撑和原文溯源，不再只是调召回参数。</p>
            </div>
          </div>
        </section>
      </main>
    </div>

    <div id="case-hover-card" class="case-hover-card hidden"></div>

    <aside id="case-drawer" class="case-drawer" aria-hidden="true">
      <div class="drawer-mask" data-close-drawer="true"></div>
      <div class="drawer-panel">
        <button type="button" class="drawer-close" data-close-drawer="true">关闭</button>
        <div id="drawer-content" class="drawer-content"></div>
      </div>
    </aside>

    <script>
      window.CASE_ADVISOR_DEFAULTS = {{ defaults|tojson }};
    </script>
    <script src="{{ url_for('static', filename='legal_case_advisor.js', v=static_version) }}" defer></script>
  </body>
</html>
